<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAJ Visitor Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>
.dashboard-container{
    max-width:900px;
    margin:auto;
    padding:10px;
}

.dashboard-title{
    text-align:center;
    margin:10px 0 15px;
    color:#1565c0;
    font-size:32px;
    font-weight:bold;
}

.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-bottom:15px;
}

.stat-card{
    background:white;
    padding:12px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.stat-card h3{
    margin-bottom:8px;
    font-size:18px;
}

.stat-value{
    font-size:28px;
    font-weight:bold;
}

.total{
    color:#1565c0;
}

.men{
    color:#1976d2;
}

.women{
    color:#e91e63;
}

.children{
    color:#ff9800;
}

.section-box{
    background:white;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.section-box h2{
    font-size:22px;
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#f4f6f9;
}

#backBtn{
    width:100%;
    padding:12px;
    font-size:18px;
    font-weight:bold;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

@media (max-width:480px){

    .dashboard-title{
        font-size:24px;
    }

    .card-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .stat-card{
        padding:10px;
    }

    .stat-card h3{
        font-size:14px;
    }

    .stat-value{
        font-size:22px;
    }

    .section-box{
        padding:10px;
    }

    .section-box h2{
        font-size:18px;
    }

    th,td{
        font-size:12px;
        padding:6px;
    }

    #backBtn{
        font-size:16px;
        padding:10px;
    }
}


</style>

</head>

<body>

<div class="dashboard-container">

<h1 class="dashboard-title">
RAJ VISITOR DASHBOARD
</h1>

<div class="card-grid">

<div class="stat-card">
<h3>Total Visitors</h3>
<div class="stat-value total" id="totalVisitorsCard">
0
</div>
</div>

<div class="stat-card">
<h3>Men</h3>
<div class="stat-value men" id="menVisitors">
0
</div>
</div>

<div class="stat-card">
<h3>Women</h3>
<div class="stat-value women" id="womenVisitors">
0
</div>
</div>

<div class="stat-card">
<h3>Children</h3>
<div class="stat-value children" id="childrenVisitors">
0
</div>
</div>

</div>

<div class="section-box">

<h2>Peak Statistics</h2>

<br>

<p>
Peak Hour :
<span id="peakHour">
Loading...
</span>
</p>

<br>

<p>
Peak Day :
<span id="peakDay">
Loading...
</span>
</p>

</div>

<div class="section-box">

<h2>Recent Slot Summary</h2>

<br>

<table>

<thead>
<tr>
<th>Slot</th>
<th>Men</th>
<th>Women</th>
<th>Children</th>
<th>Total</th>
</tr>
</thead>

<tbody id="recentTable">

<tr>
<td colspan="5">
No Data Yet
</td>
</tr>

</tbody>

</table>

</div>

<button id="backBtn"
onclick="window.location.href='index.html'">

BACK TO COUNTER

</button>

</div>

<script src="dashboard.js"></script>

</body>
</html>
